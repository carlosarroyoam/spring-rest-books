                $ref: "#/components/schemas/PagedShipmentsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: []

  /shipments/{shipmentId}:
    get:
      tags:
        - Shipments
      summary: Gets an shipment by its id
      operationId: findShipmentById
      parameters:
        - name: shipmentId
          in: path
          required: true
          description: ID of the shipment to query
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShipmentDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: []

    put:
      tags:
        - Shipments
      summary: Updates the status of a shipment by its id
      operationId: updateShipmentStatus
      parameters:
        - name: shipmentId
          in: path
          required: true
          description: ID of the shipment to update
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShipmentStatusRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: []

components:
  schemas:
    PagedBooksResponse:
      type: object
      description: Paginated response containing a list of books and pagination metadata.
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          description: List of books for the current page.
          items:
            $ref: "#/components/schemas/BookDto"
        pagination:
          description: Pagination metadata describing the current page and total results.
          $ref: "#/components/schemas/PaginationDto"

    CreateBookRequest:
      type: object
      description: Request payload used to create a new book.
      required:
        - cover_url
        - is_available_online
        - isbn
        - price
        - published_at
        - title
      properties:
        isbn:
          type: string
          description: International Standard Book Number identifying the book.
          minLength: 10
          maxLength: 17
        title:
          type: string
          description: Title of the book.
          minLength: 3
          maxLength: 128
        cover_url:
          type: string
          description: URL pointing to the book cover image.
          minLength: 3
          maxLength: 512
        price:
          type: number
          description: Retail price of the book.
        is_available_online:
          type: boolean
          description: Indicates whether the book can be purchased online.
        published_at:
          type: string
          format: date
          description: Publication date of the book.

    UpdateBookRequest:
      type: object
      description: Request payload used to update an existing book.
      required:
        - cover_url
        - is_available_online
        - isbn
        - price
        - published_at
        - title
      properties:
        isbn:
          type: string
          description: Updated ISBN of the book.
          minLength: 10
          maxLength: 17
        title:
          type: string
          description: Updated title of the book.
          minLength: 3
          maxLength: 128
        cover_url:
          type: string
          description: Updated URL for the book cover image.
          minLength: 3
          maxLength: 512
        price:
          type: number
          description: Updated retail price.
        is_available_online:
          type: boolean
          description: Indicates whether the book is available for online purchase.
        published_at:
          type: string
          format: date
          description: Updated publication date.

    PagedAuthorsResponse:
      type: object
      description: Paginated response containing authors.
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          description: List of authors in the current page.
          items:
            $ref: "#/components/schemas/AuthorDto"
        pagination:
          description: Pagination metadata describing the current page and total results.
          $ref: "#/components/schemas/PaginationDto"

    CreateAuthorRequest:
      type: object
      description: Request payload used to create a new author.
      required:
        - name
      properties:
        name:
          type: string
          description: Full name of the author.
          minLength: 3
          maxLength: 128

    UpdateAuthorRequest:
      type: object
      description: Request payload used to update an existing author.
      required:
        - name
      properties:
        name:
          type: string
          description: Updated author name.
          minLength: 3
          maxLength: 128

    PagedCustomersResponse:
      type: object
      description: Paginated response containing customers.
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          description: List of customers for the current page.
          items:
            $ref: "#/components/schemas/CustomerDto"
        pagination:
          $ref: "#/components/schemas/PaginationDto"

    CreateCustomerRequest:
      type: object
      description: Request payload used to register a new customer.
      required:
        - first_name
        - last_name
        - username
        - email
      properties:
        first_name:
          type: string
          description: Customer's first name.
          minLength: 3
          maxLength: 128
        last_name:
          type: string
          description: Customer's last name.
          minLength: 3
          maxLength: 128
        email:
          type: string
          description: Customer email address.
          minLength: 3
          maxLength: 128
        username:
          type: string
          description: Unique username used by the customer.
          minLength: 3
          maxLength: 128

    UpdateCustomerRequest:
      type: object
      description: Request payload used to update customer information.
      required:
        - first_name
        - last_name
      properties:
        first_name:
          type: string
          description: Updated first name.
          minLength: 3
          maxLength: 128
        last_name:
          type: string
          description: Updated last name.
          minLength: 3
          maxLength: 128

    AddCartItemRequest:
      type: object
      description: Request payload used to add a book to the customer's shopping cart.
      required:
        - book_id
      properties:
        book_id:
          type: integer
          format: int64
          description: Identifier of the book to add to the cart.
        quantity:
          type: integer
          format: int32
          minimum: 1
          description: Number of units to add to the cart.

    UpdateCartItemRequest:
      type: object
      description: Request payload used to update the quantity of an item in the cart.
      required:
        - book_id
      properties:
        book_id:
          type: integer
          format: int64
          description: Identifier of the book in the cart.
        quantity:
          type: integer
          format: int32
          minimum: 1
          description: Updated quantity.

    PagedOrdersResponse:
      type: object
      description: Paginated response containing orders.
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          description: Orders included in the current page.
          items:
            $ref: "#/components/schemas/OrderDto"
        pagination:
          $ref: "#/components/schemas/PaginationDto"

    CreateOrderRequest:
      type: object
      description: Request payload used to create a new order.
      required:
        - customer_id
        - shipping_address
        - billing_address
        - items
      properties:
        customer_id:
          type: integer
          format: int64
          description: Identifier of the customer placing the order.
        shipping_address:
          type: string
          description: Shipping address where the order will be delivered.
          minLength: 10
          maxLength: 512
        billing_address:
          type: string
          description: Billing address associated with the order.
          minLength: 10
          maxLength: 512
        notes:
          type: string
          description: Optional notes related to the order.
          maxLength: 1000
        items:
          type: array
          description: List of items included in the order.
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateOrderItemRequest"

    UpdateOrderRequest:
      type: object
      description: Request payload used to update shipping or billing information of an order.
      required:
        - shipping_address
        - billing_address
      properties:
        shipping_address:
          type: string
          description: Updated shipping address.
          minLength: 10
          maxLength: 512
        billing_address:
          type: string
          description: Updated billing address.
          minLength: 10
          maxLength: 512
        notes:
          type: string
          description: Updated order notes.
          maxLength: 1000

    CreateOrderItemRequest:
      type: object
      description: Request payload representing an item within an order.
      required:
        - book_id
        - quantity
      properties:
        book_id:
          type: integer
          format: int64
          description: Identifier of the book being purchased.
        quantity:
          type: integer
          format: int32
          minimum: 1
          description: Quantity of the selected book.

    PagedPaymentsResponse:
      type: object
      description: Paginated response containing payments.
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          description: Payments included in the current page.
          items:
            $ref: "#/components/schemas/PaymentDto"
        pagination:
          description: Pagination metadata describing the current page and total results.
          $ref: "#/components/schemas/PaginationDto"

    CreatePaymentRequest:
      type: object
      description: Request payload used to create a payment for an order.
      required:
        - order_id
        - method
      properties:
        order_id:
          type: integer
          format: int64
          description: Identifier of the order being paid.
        method:
          type: string
          description: Payment method used to complete the transaction.
          enum:
            - CREDIT_CARD
            - DEBIT_CARD
            - PAYPAL
            - BANK_TRANSFER
            - CASH_ON_DELIVERY

    UpdatePaymentStatusRequest:
      type: object
      description: Request payload used to update the processing status of a payment.
      required:
        - status
      properties:
        status:
          type: string
          description: Updated payment processing status.
          enum:
            - PENDING
            - COMPLETED
            - FAILED
            - CANCELLED
            - REFUNDED

    UpdateShipmentStatusRequest:
      type: object
      description: Request payload used to update the delivery status of a shipment.
      required:
        - status
      properties:
        status:
          type: string
          description: Updated shipment status.
          enum:
            - PENDING
            - SHIPPED
            - DELIVERED
            - RETURNED
            - CANCELLED

    PagedShipmentsResponse:
      type: object
      description: Paginated response containing shipment records.
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          description: Shipments included in the current page.
          items:
            $ref: "#/components/schemas/ShipmentDto"
        pagination:
          description: Pagination metadata describing the current page and total results.
          $ref: "#/components/schemas/PaginationDto"

    BookDto:
      type: object
      description: Representation of a book in the catalog.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the book.
        isbn:
          type: string
          description: ISBN code identifying the book.
        title:
          type: string
          description: Title of the book.
        cover_url:
          type: string
          description: URL of the book cover image.
        authors:
          type: array
          description: List of authors associated with the book.
          items:
            $ref: "#/components/schemas/AuthorDto"
        price:
          type: number
          description: Price of the book.
        is_available_online:
          type: boolean
          description: Indicates whether the book can be purchased online.
        published_at:
          type: string
          format: date
          description: Date when the book was published.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the book record was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the last update.

    AuthorDto:
      type: object
      description: Representation of an author.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the author.
        name:
          type: string
          description: Full name of the author.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the author record was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the last update.

    CustomerDto:
      type: object
      description: Representation of a customer registered in the system.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the customer.
        first_name:
          type: string
          description: Customer's first name.
        last_name:
          type: string
          description: Customer's last name.
        email:
          type: string
          description: Customer's email address.
        username:
          type: string
          description: Username used for authentication or identification.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the customer was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the last update.

    OrderDto:
      type: object
      description: Representation of a customer order including its items, payment, shipment information, and calculated totals.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the order.
        order_number:
          type: string
          description: Human-readable unique order number.
        status:
          type: string
          description: Current status of the order lifecycle.
          enum:
            - PENDING
            - CONFIRMED
            - PROCESSING
            - SHIPPED
            - DELIVERED
            - CANCELLED
            - REFUNDED
        items:
          type: array
          description: List of items included in the order.
          items:
            $ref: "#/components/schemas/OrderItemDto"
        subtotal:
          type: number
          description: Sum of all order item prices before taxes and shipping.
        tax_amount:
          type: number
          description: Total tax amount applied to the order.
        shipping_amount:
          type: number
          description: Shipping cost applied to the order.
        total:
          type: number
          description: Final total amount of the order including taxes and shipping.
        customer:
          description: Customer who placed the order.
          $ref: "#/components/schemas/CustomerDto"
        payment:
          description: Payment information associated with the order.
          $ref: "#/components/schemas/PaymentDto"
        shipment:
          description: Shipment details for the order delivery.
          $ref: "#/components/schemas/ShipmentDto"
        notes:
          type: string
          description: Optional notes associated with the order.
        shipping_address:
          type: string
          description: Shipping address for the order delivery.
        billing_address:
          type: string
          description: Billing address associated with the order.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the order was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the order was last updated.

    OrderItemDto:
      type: object
      description: Representation of a single item within an order.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the order item.
        quantity:
          type: number
          description: Number of units purchased for the associated book.
        unit_price:
          type: number
          description: Price of a single unit of the book at the time of purchase.
        total_price:
          type: number
          description: Total price for the item calculated as quantity multiplied by unit price.
        book_id:
          type: number
          format: int64
          description: Identifier of the book included in the order.
        book:
          description: Book details for the order item.
          $ref: "#/components/schemas/BookDto"
        created_at:
          type: string
          format: date-time
          description: Timestamp when the order item was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the order item was last updated.

    CartDto:
      type: object
      description: Representation of a customer's shopping cart containing selected books before checkout.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the shopping cart.
        items:
          type: array
          description: List of items currently in the cart.
          items:
            $ref: "#/components/schemas/CartItemDto"
        customer:
          description: Customer who owns the cart.
          $ref: "#/components/schemas/CustomerDto"
        total_items:
          type: integer
          description: Total number of items in the cart.
        total_price:
          type: number
          description: Total price of all items in the cart.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the cart was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the cart was last updated.

    CartItemDto:
      type: object
      description: Representation of a book item inside a shopping cart.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the cart item.
        quantity:
          type: number
          description: Quantity of the selected book in the cart.
        book_id:
          type: number
          format: int64
          description: Identifier of the book added to the cart.
        book:
          description: Book details for the cart item.
          $ref: "#/components/schemas/BookDto"
        added_at:
          type: string
          format: date-time
          description: Timestamp when the item was added to the cart.

    PaymentDto:
      type: object
      description: Representation of a payment associated with an order.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the payment.
        amount:
          type: number
          description: Total amount paid in the transaction.
        method:
          type: string
          description: Payment method used to complete the transaction.
          enum:
            - CREDIT_CARD
            - DEBIT_CARD
            - PAYPAL
            - BANK_TRANSFER
            - CASH_ON_DELIVERY
        status:
          type: string
          description: Current payment processing status.
          enum:
            - PENDING
            - COMPLETED
            - FAILED
            - CANCELLED
            - REFUNDED
        transaction_id:
          type: string
          description: External transaction identifier returned by the payment provider.
        order_id:
          type: number
          format: int64
          description: Identifier of the order associated with this payment.

    ShipmentDto:
      type: object
      description: Representation of shipment information for an order delivery.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the shipment.
        attention_name:
          type: string
          description: Name of the person who will receive the shipment.
        address:
          type: string
          description: Delivery address where the order will be shipped.
        phone:
          type: string
          description: Contact phone number for the shipment recipient.
        status:
          type: string
          description: Current shipment status.
          enum:
            - PENDING
            - SHIPPED
            - DELIVERED
            - RETURNED
            - CANCELLED
        order_id:
          type: integer
          format: int64
          description: Identifier of the order associated with this shipment.

    PaginationDto:
      type: object
      description: Metadata describing pagination information for a paginated response.
      required:
        - page
        - size
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          example: 0
          description: Current page index (0-based).
        size:
          type: integer
          example: 25
          description: Number of items returned per page.
        total_items:
          type: integer
          example: 1
          description: Total number of available items.
        total_pages:
          type: integer
          example: 1
          description: Total number of pages available.

    AppExceptionDto:
      type: object
      description: Standard error response returned when an application exception occurs.
      properties:
        message:
          type: string
          description: Human-readable error message.
        error:
          type: string
          description: Short error identifier or error type.
        status:
          type: integer
          description: HTTP status code associated with the error.
        details:
          type: object
          description: Additional validation or error details.
          additionalProperties:
            type: string
        path:
          type: string
          description: API endpoint path where the error occurred.
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error was generated.

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      description: Page index (0-based).
      schema:
        type: integer
        format: int32
        default: 0

    SizeParam:
      name: size
      in: query
      required: false
      description: Number of items per page.
      schema:
        type: integer
        format: int32
        default: 25

  responses:
    Created:
      description: Created

    NoContent:
      description: No content

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionDto"

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionDto"

    UnprocesableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionDto"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionDto"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionDto"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionDto"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
