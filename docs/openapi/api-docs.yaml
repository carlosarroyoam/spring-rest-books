openapi: 3.0.1
info:
  title: Spring REST Books API
  description: |
    A comprehensive REST API for managing a bookstore system including 
    books, authors, customers, carts, orders, payments and shipments.

    ## Features
    - Books.
    - Authors.
    - Customers.
    - Carts.
    - Orders.
    - Payments.
    - Shipments.
  contact:
    email: carlosarroyoam@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.0.1-SNAPSHOT

servers:
  - url: http://localhost:8081
    description: Localhost server url

security:
  - bearerAuth: []

tags:
  - name: Books
    description: Operations related to book management
  - name: Authors
    description: Operations related to authors
  - name: Customers
    description: Customer management operations
  - name: Carts
    description: Cart management operations
  - name: Orders
    description: Order management and processing
  - name: Payments
    description: Payment processing operations
  - name: Shipments
    description: Shipment and delivery tracking

paths:
  /books:
    get:
      tags:
        - Books
      summary: Gets the list of books
      operationId: findAllBooks
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - name: isbn
          in: query
          required: false
          description: Book's ISBN.
          schema:
            type: string
            minLength: 10
            maxLength: 17
        - name: title
          in: query
          description: Book's title.
          required: false
          schema:
            type: string
            maxLength: 128
        - name: authorIds
          in: query
          description: Comma separated author ids.
          required: false
          schema:
            type: string
        - name: isAvailableOnline
          in: query
          description: Whether the book can be purchased online.
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedBooksResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: []

    post:
      tags:
        - Books
      summary: Creates a new book
      operationId: createBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookRequest"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: []

  /books/{bookId}:
    get:
      tags:
        - Books
      summary: Gets a book by its id
      operationId: findBookById
      parameters:
        - name: bookId
          in: path
          required: true
          description: ID of the book to query
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: []

    put:
      tags:
        - Books
      summary: Updates a book by its id
      operationId: updateBook
      parameters:
        - name: bookId
          in: path
          required: true
          description: ID of the book to update
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: []

    delete:
      tags:
        - Books
      summary: Deletes a book by its id
      operationId: deleteBook
      parameters:
        - name: bookId
          in: path
          required: true
          description: ID of the book to delete
          schema:
            type: integer
            format: int64
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: []

